<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFIKI Gaming - Official</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-trigger" onclick="toggleSidebar()">☰</div>
        <div class="logo">SAFIKI</div>
        <div class="auth-buttons">
            <button class="login-btn">Login</button>
            <button class="register-btn">Register</button>
        </div>
    </header>

    <aside id="sidebar" class="sidebar">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Invite & Earn</a></li>
                <li><a href="#">VIP Club</a></li>
                <li><a href="#">Promotions</a></li>
                <li><a href="#">Rewards</a></li>
                <li><a href="#">Transactions</a></li>
                <li><a href="#">Support</a></li>
                <li><a href="#">Settings</a></li>
                <li><a href="#">Logout</a></li>
            </ul>
        </nav>
    </aside>

    <main class="container">
        <section class="hero-section">
            <img src="image/banner.png" alt="Hero Banner">
        </section>

        <section class="game-categories">
            <div class="category-item"><img src="image/jhandi.png" alt="Jhandi Munda"><span>Jhandi Munda</span></div>
            <div class="category-item"><img src="image/teenpatti.png" alt="Teen Patti"><span>Teen Patti</span></div>
            <div class="category-item"><img src="image/dice.png" alt="Dice"><span>Dice</span></div>
            <div class="category-item"><img src="image/more.png" alt="More"><span>More</span></div>
        </section>

        <section class="featured-games">
            <img src="image/jhandimain.png" alt="Jhandi Munda Main">
            <img src="image/teenpattimain.png" alt="Teen Patti Main">
        </section>

        <section class="payment-gateway">
            <button class="pay-btn deposit">Deposit</button>
            <button class="pay-btn withdraw">Withdraw</button>
        </section>
    </main>

    <footer class="bottom-nav">
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Wallet</a>
        <a href="#">Refer</a>
        <a href="#">Profile</a>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
