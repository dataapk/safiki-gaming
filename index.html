<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Header and Footer Structure</title>
    <!-- প্রফেশনাল আইকনের জন্য Font Awesome সিডিএন -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- হেডার সেকশন -->
<header class="header">
    <div class="logo">◈</div>
    <nav class="nav-group">
        <div class="balance-container" onclick="toggleCurrencyMenu()">
            <div class="balance-box">
                <span class="currency-icon">₮</span>
                <span class="balance-text">0.08579204</span>
                <span class="dropdown-arrow"><i class="fas fa-chevron-down"></i></span>
            </div>
            <div id="currencyDropdown" class="dropdown-menu">
                <div class="dropdown-item">USDT</div>
                <div class="dropdown-item">USDC</div>
                <div class="dropdown-item">BTC</div>
            </div>
        </div>
        <div class="nav-icons">
            <span class="icon"><i class="fas fa-wallet"></i></span>
            <span class="icon"><i class="fas fa-bell"></i></span>
            <span class="icon"><i class="fas fa-user-circle"></i></span>
        </div>
    </nav>
</header>

<!-- হিরো সেকশন স্টার্ট -->
<section class="hero-section">
    <div class="hero-slider">
        <!-- স্লাইড ১ -->
        <div class="slide">
            <img src="image/banner.png" alt="Promotion Banner">
        </div>
        <!-- স্লাইড ২ -->
        <div class="slide">
            <img src="image/banner.png" alt="Promotion Banner">
        </div>
        <!-- স্লাইড ৩ -->
        <div class="slide">
            <img src="image/banner.png" alt="Promotion Banner">
        </div>
    </div>

    <!-- স্লাইডার ডট ইন্ডিকেটর -->
    <div class="slider-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
</section>
<!-- হিরো সেকশন ইন্ড -->
<!-- ======================================================
     🔴 END: HERO SECTION
====================================================== -->


<!-- ======================================================
     🟢 START: CATEGORY SECTION
====================================================== -->
<!-- ক্যাটাগরি সেকশন স্টার্ট -->
<section class="category-section">
    <div class="category-wrapper">
        <div class="category-item active">
            <div class="category-icon"><i class="fas fa-th-large"></i></div>
            <span>All</span>
        </div>
        <div class="category-item">
            <div class="category-icon"><i class="fas fa-dharmachakra"></i></div>
            <span>Wheel</span>
        </div>
        <div class="category-item">
            <div class="category-icon"><i class="fas fa-dice-d6"></i></div>
            <span>Dice</span>
        </div>
        <div class="category-item">
            <div class="category-icon"><i class="fas fa-rocket"></i></div>
            <span>Crash</span>
        </div>
        <!-- প্রয়োজনে এখানে আরও ক্যাটাগরি আইটেম যুক্ত করতে পারবেন -->
    </div>
</section>
<!-- ক্যাটাগরি সেকশন ইন্ড -->
<!-- ======================================================
     🔴 END: CATEGORY SECTION
====================================================== -->


<!-- ======================================================
     🟢 START: POPULAR GAME TITLE
====================================================== -->
<!-- গেম সেকশন স্টার্ট -->
<section class="game-section">
    <div class="section-header">
        <h2>Popular Games</h2>
    </div>
    
    <div class="game-grid">
        <!-- গেম কার্ড ১ -->
        <div class="game-card">
            <div class="game-image">
                <img src="images/game1.png" alt="Game Name">
                <div class="play-overlay">
                    <button class="play-btn">Play Now</button>
                </div>
            </div>
            <div class="game-info">
                <h3>Funky Wheel</h3>
            </div>
        </div>

        <!-- গেম কার্ড ২ -->
        <div class="game-card">
            <div class="game-image">
                <img src="images/game2.png" alt="Game Name">
                <div class="play-overlay">
                    <button class="play-btn">Play Now</button>
                </div>
            </div>
            <div class="game-info">
                <h3>Dice Roll</h3>
            </div>
        </div>

        <!-- গেম কার্ড ৩ -->
        <div class="game-card">
            <div class="game-image">
                <img src="images/game3.png" alt="Game Name">
                <div class="play-overlay">
                    <button class="play-btn">Play Now</button>
                </div>
            </div>
            <div class="game-info">
                <h3>Crash X</h3>
            </div>
        </div>

        <!-- গেম কার্ড ৪ -->
        <div class="game-card">
            <div class="game-image">
                <img src="images/game4.png" alt="Game Name">
                <div class="play-overlay">
                    <button class="play-btn">Play Now</button>
                </div>
            </div>
            <div class="game-info">
                <h3>Gold Mines</h3>
            </div>
        </div>
    </div>
</section>
<!-- গেম সেকশন ইন্ড -->
<!-- ======================================================
     🔴 END: POPULAR GAMES
====================================================== -->
<!-- লাইভ উইনার সেকশন স্টার্ট -->
<section class="live-winners-section">
    <!-- হেডার বক্সের বাইরে -->
    <div class="section-header">
        <h2><i class="fas fa-trophy" style="color: #ffd700;"></i> Live Winners</h2>
    </div>
    
    <!-- শুধুমাত্র লিস্ট বক্সের ভেতরে -->
    <div class="winners-list-container">
        <div class="winners-list">
            <!-- আপনার ১০টি উইনার আইটেম এখানে থাকবে -->
            <div class="winner-item">
                <span><i class="fas fa-user"></i> User_123</span>
                <span class="win-amount">$150.00</span>
            </div>
            <!-- ... বাকি আইটেমগুলো এখানে বসান ... -->
        </div>
    </div>
</section>
<!-- লাইভ উইনার সেকশন ইন্ড -->




<!-- ======================================================
     🟢 START: FIXED FOOTER
====================================================== -->
<footer class="footer">
    <div class="footer-item">
        <i class="fas fa-bars"></i>
        <span>Menu</span>
    </div>
    <div class="footer-item">
        <i class="fas fa-dharmachakra"></i>
        <span>Wheel</span>
    </div>
    <div class="footer-item">
        <i class="fas fa-search"></i>
        <span>Search</span>
    </div>
    <div class="footer-item">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
