<!DOCTYPE html>

<html lang="en">

<head>

    <!-- Basic Setup -->

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SAFIKI Gaming | Login & Register</title>

    <meta name="description" content="SAFIKI Gaming Authentication">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header Start -->

    <header class="top-nav">

        <div class="header-left">

            <a href="index.html" class="back-btn">
                ← Home
            </a>

        </div>

        <div class="header-center">

            <div class="logo">
                SAFIKI
            </div>

        </div>

        <div class="header-right">

        </div>

    </header>

    <!-- Header End -->


    <!-- Authentication Section Start -->

    <section class="auth-section">

        <div class="auth-container">

            <!-- Authentication Title -->

            <div class="auth-header">

                <h1>Welcome to SAFIKI Gaming</h1>

                <p>
                    Login or Create Your Account
                </p>

            </div>


            <!-- Login Form Start -->

            <div class="auth-card">

                <h2>Login</h2>

                <form class="login-form">

                    <input
                        type="text"
                        name="login_email"
                        placeholder="Email or Mobile Number"
                        required>

                    <input
                        type="password"
                        name="login_password"
                        placeholder="Password"
                        required>

                    <button type="submit" class="auth-btn">

                        Login

                    </button>

                </form>

            </div>

            <!-- Login Form End -->


            <!-- Register Form Start -->

            <div class="auth-card">

                <h2>Create Account</h2>

                <form class="register-form">

                    <input
                        type="text"
                        name="first_name"
                        placeholder="First Name"
                        required>

                    <input
                        type="text"
                        name="last_name"
                        placeholder="Last Name"
                        required>

                    <input
                        type="text"
                        name="register_email"
                        placeholder="Email or Mobile Number"
                        required>

                    <input
                        type="password"
                        name="register_password"
                        placeholder="Password"
                        required>

                    <input
                        type="password"
                        name="confirm_password"
                        placeholder="Confirm Password"
                        required>

                    <input
                        type="text"
                        name="referral_code"
                        placeholder="Referral Code (Optional)">

                    <button type="submit" class="auth-btn">

                        Sign Up

                    </button>

                </form>

            </div>

            <!-- Register Form End -->

        </div>

    </section>

    <!-- Authentication Section End -->


    <!-- Footer Start -->

    <footer class="bottom-nav">

        <a href="index.html" class="footer-btn">
            Home
        </a>

        <a href="#" class="footer-btn">
            Support
        </a>

        <a href="#" class="footer-btn">
            Privacy
        </a>

        <a href="#" class="footer-btn">
            Contact
        </a>

    </footer>

    <!-- Footer End -->


    <script src="script.js"></script>

</body>

</html>
