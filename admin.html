<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFIKI ADMIN PANEL</title>

<link rel="stylesheet" href="admin.css">

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="admin-logo">
        SAFIKI ADMIN
    </div>

    <ul class="sidebar-menu">

        <li id="dashboardMenu">Dashboard</li>

        <li id="usersMenu">Users</li>

        <li id="financeMenu">Finance</li>

        <li id="rewardsMenu">Rewards</li>

        <li id="referralMenu">Referral</li>

        <li id="gamesMenu">Games</li>

        <li id="securityMenu">Security</li>

        <li id="settingsMenu">Settings</li>

        <li id="logoutMenu">Logout</li>

    </ul>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- HEADER -->

    <div class="admin-header">

        <h2>Dashboard</h2>

    </div>

    <!-- DASHBOARD CARDS -->

    <div class="stats-grid">

        <div class="stat-card">
            <h3>Total Users</h3>
            <span>150</span>
        </div>

        <div class="stat-card">
            <h3>Total Deposit</h3>
            <span>$5000</span>
        </div>

    </div>

    <!-- USERS MANAGEMENT -->

    <div class="admin-section">

        <h2>Users Management</h2>

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Balance</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>1001</td>

                    <td>Player One</td>

                    <td>player@gmail.com</td>

                    <td>$50</td>

                    <td>Active</td>

                    <td>
                        <button class="view-user">
                            View
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
