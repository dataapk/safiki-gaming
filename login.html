<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Safiki Gaming</title>
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Tab Header -->
        <div class="tab-header">
            <div class="active" id="login-tab">Login</div>
            <div id="register-tab">Register</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" method="POST" action="/api/login">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <div class="forgot-link"><a href="#">Forgot Password?</a></div>
            <button type="submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" method="POST" action="/api/register" style="display:none;">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
