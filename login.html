<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Popup - SAFIKI</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #fff; display:flex; justify-content:center; align-items:flex-start; padding-top:50px; height:100vh; }
.login-container {
    background: #8B3A62; /* light maroon box */
    padding: 25px;
    border-radius: 16px;
    width: 320px;
    max-width: 90%;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    position: relative;
}
.login-container h2 {
    background-color: #5a1f3c; /* highlighted top */
    color: #fff;
    margin: -25px -25px 20px -25px;
    padding: 12px;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    text-align: center;
    font-size: 18px;
}
.login-container input[type="text"],
.login-container input[type="password"] {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background: rgba(255,255,255,0.1);
    color:#fff;
    font-size:14px;
}
.login-container input::placeholder { color:#eee; }
.login-container .login-btn {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:none;
    background: linear-gradient(145deg,#6a0dad,#8A2BE2);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    transition:all 0.3s ease;
}
.login-container .login-btn:hover { transform:translateY(-1px) scale(1.02); box-shadow:0 8px 20px rgba(0,0,0,0.5);}
.login-container .options {
    display:flex;
    justify-content:space-between;
    font-size:14px;
    color:#fff;
    margin-top:10px;
    padding:6px;
    background-color: rgba(255,255,255,0.1);
    border-radius:10px;
}
.login-container .options a { color:#FFD700; text-decoration:none; }
.login-container .options a:hover { text-decoration:underline; }

@media(max-width:500px){
    .login-container { width:90%; padding:20px; }
}
</style>
</head>
<body>

<div class="login-container">
    <h2>User Login</h2>
    <form id="loginForm">
        <input type="text" placeholder="Username" id="username" value="" required>
        <input type="password" placeholder="Password" id="password" value="" required>
        <button type="submit" class="login-btn">Login</button>
        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if(username && password){
        localStorage.setItem('userEmail', username);
        localStorage.setItem('isLoggedIn','true');
        alert('Login successful (frontend simulation)');

        // ✅ এই লাইনটি বসাতে হবে
        window.location.href = 'dashboard.html';
    } else {
        alert('Please fill all fields');
    }
});
</script>

</body>
</html>
