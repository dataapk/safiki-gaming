<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Login - SAFIKI</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#8A2BE2,#6a0dad); display:flex; justify-content:center; align-items:center; height:100vh; }
.login-container { background:#9b59b6; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5); width:350px; text-align:center;}
.login-container h2 { color:#fff; margin-bottom:20px; letter-spacing:1px;}
.login-container input[type="text"], .login-container input[type="password"] { width:100%; padding:15px; margin:10px 0; border-radius:12px; border:none; box-shadow:inset 0 4px 10px rgba(255,255,255,0.2), inset 0 -4px 6px rgba(0,0,0,0.2); font-size:16px; color:#fff; background: rgba(255,255,255,0.1);}
.login-container input::placeholder { color:#eee;}
.login-container .login-btn { width:100%; padding:15px; margin-top:15px; border:none; border-radius:12px; font-weight:700; background: linear-gradient(145deg,#6a0dad,#8A2BE2); color:#fff; cursor:pointer; box-shadow:0 6px 15px rgba(0,0,0,0.4); transition:all 0.3s ease;}
.login-container .login-btn:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 10px 20px rgba(0,0,0,0.6);}
.login-container .options { display:flex; justify-content:space-between; font-size:14px; color:#eee; margin-top:10px;}
.login-container .options a { color:#fff; text-decoration:none;}
.login-container .options a:hover { text-decoration:underline;}
</style>
</head>
<body>

<div class="login-container">
    <h2>USER LOGIN</h2>
    <form id="loginForm">
        <input type="text" placeholder="Username" id="username" required value="">
        <input type="password" placeholder="Password" id="password" required value="">
        <button class="login-btn" type="submit">LOGIN</button>
        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    if(username && password){
        localStorage.setItem('userEmail', username); // store for header
        localStorage.setItem('isLoggedIn', 'true');
        alert('Login successful (frontend simulation)');
    } else {
        alert('Please fill all fields');
    }
});
</script>

</body>
</html>
